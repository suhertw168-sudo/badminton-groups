<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽球分組系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Bebas+Neue&display=swap');

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --card: #f8fafc;
    --border: #d1dce8;
    --accent: #0077cc;
    --accent2: #f0a500;
    --text: #1a2a3a;
    --muted: #6b7f96;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(0,119,204,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(240,165,0,0.07) 0%, transparent 50%);
  }

  /* ════════ HEADER ════════ */
  header {
    text-align: center;
    padding: 24px 16px 14px;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '🏸';
    position: absolute;
    font-size: 160px;
    opacity: 0.04;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 8vw, 5rem);
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* ════════ LAYOUT ════════ */
  .container { max-width: 900px; margin: 0 auto; padding: 10px; }

  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 14px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .setup-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .panel-title {
    font-size: 0.68rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ════════ CONTROLS ════════ */
  .count-select-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .select-row-item  { display: flex; align-items: center; gap: 10px; }
  .select-row-item label { min-width: 76px; }

  label { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }

  select {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    min-width: 110px;
  }
  select:hover, select:focus { border-color: var(--accent); }

  /* ════════ PLAYER GRID ════════ */
  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }
  .player-input-wrap { position: relative; }
  .player-num {
    position: absolute;
    left: 9px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.68rem;
    color: var(--accent);
    font-weight: 700;
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 9px 9px 30px;
    font-size: 0.88rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
  input[type="text"]::placeholder { color: var(--muted); font-size: 0.78rem; }

  /* ════════ BUTTONS ════════ */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border: none; border-radius: 10px;
    font-family: inherit; font-size: 0.88rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #0099bb); color: #000; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,212,255,0.35); }
  .btn-secondary { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  /* ════════ RESULTS ════════ */
  .results-section { display: none; }
  .results-section.visible { display: block; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 6px; text-align: center;
  }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 4px; }

  /* ════════ SCHEDULE TABLE ════════ */
  .schedule-table-wrap { border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  .schedule-table { width: 100%; border-collapse: collapse; background: var(--card); }
  .schedule-table thead tr { background: #e8f0f8; border-bottom: 2px solid var(--border); }
  .schedule-table th {
    padding: 7px 8px; font-size: 0.58rem; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted); font-weight: 600;
  }
  .schedule-table th.th-num  { text-align: left; width: 44px; }
  .schedule-table th.th-a    { text-align: right; color: #4d8fff; }
  .schedule-table th.th-vs   { text-align: center; width: 24px; }
  .schedule-table th.th-b    { text-align: left; color: #c98000; }
  .schedule-table th.th-rest { text-align: left; color: var(--muted); }
  .schedule-table tbody tr { border-top: 1px solid var(--border); transition: background 0.15s; }
  .schedule-table tbody tr:hover { background: #eef4fb; }
  .schedule-table td { padding: 7px 8px; vertical-align: middle; }
  .td-num { font-size: 0.65rem; color: var(--muted); white-space: nowrap; }
  .td-a  { text-align: right; }
  .td-vs {
    text-align: center; font-family: 'Bebas Neue', sans-serif;
    font-size: 0.78rem; color: var(--border); white-space: nowrap;
    width: 24px; padding-left: 1px; padding-right: 1px;
  }
  .td-b    { text-align: left; }
  .td-rest { text-align: left; }
  .names-a    { display: flex; gap: 3px; justify-content: flex-end; flex-wrap: wrap; }
  .names-b    { display: flex; gap: 3px; justify-content: flex-start; flex-wrap: wrap; }
  .names-rest { display: flex; gap: 3px; flex-wrap: wrap; }
  .chip-a {
    background: rgba(0,102,204,0.1); border: 1px solid rgba(0,102,204,0.3);
    color: #0055aa; border-radius: 10px; padding: 1px 6px;
    font-size: 0.72rem; font-weight: 600; white-space: nowrap;
  }
  .chip-b {
    background: rgba(200,150,0,0.12); border: 1px solid rgba(200,150,0,0.35);
    color: #b07800; border-radius: 10px; padding: 1px 6px;
    font-size: 0.72rem; font-weight: 600; white-space: nowrap;
  }
  .chip-rest { color: var(--muted); font-size: 0.68rem; white-space: nowrap; }

  /* ════════ STATS TABLE ════════ */
  .player-stats-section { margin-top: 14px; }
  .player-table {
    width: 100%; border-collapse: collapse; background: var(--card);
    border-radius: 10px; overflow: hidden; border: 1px solid var(--border);
  }
  .player-table th {
    background: #e8f0f8; padding: 7px 8px; text-align: center;
    font-size: 0.58rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
  }
  .player-table th:first-child { text-align: left; }
  .player-table td {
    padding: 8px 8px; border-top: 1px solid rgba(255,255,255,0.04);
    font-size: 0.8rem; text-align: center;
  }
  .player-table td:first-child { text-align: left; }
  .player-table tr:hover td { background: #eef4fb; }

  .bar-wrap { background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; display:none; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; }

  /* ════════ ERROR ════════ */
  .error-msg {
    background: rgba(200,150,0,0.12); border: 1px solid rgba(200,150,0,0.35);
    color: #c98000; border-radius: 10px; padding: 10px 14px;
    font-size: 0.82rem; margin-top: 10px; display: none;
  }
  .error-msg.show { display: block; }

  /* ════════════════════════════════════════
     DESKTOP OVERRIDES  (≥768px)
  ════════════════════════════════════════ */
  @media (min-width: 768px) {
    header { padding: 44px 24px 20px; }

    .container { padding: 20px; }

    .setup-panel { padding: 28px 28px; margin-bottom: 20px; border-radius: 16px; }

    .panel-title { font-size: 0.75rem; margin-bottom: 20px; }

    .count-select-row { flex-direction: row; flex-wrap: wrap; gap: 20px; margin-bottom: 24px; }
    .select-row-item label { min-width: auto; }

    label { font-size: 0.92rem; }

    select { padding: 10px 16px; font-size: 1rem; min-width: 130px; }

    .players-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-bottom: 24px; }

    input[type="text"] { padding: 11px 11px 11px 34px; font-size: 0.92rem; }

    .btn { padding: 12px 28px; font-size: 0.95rem; gap: 8px; }
    .btn-row { gap: 12px; }

    /* Stats cards */
    .stats-row { gap: 14px; margin-bottom: 20px; }
    .stat-card { padding: 18px 10px; border-radius: 12px; }
    .stat-num { font-size: 2.4rem; }
    .stat-label { font-size: 0.68rem; letter-spacing: 1px; margin-top: 6px; }

    /* Schedule table */
    .schedule-table th { padding: 10px 16px; font-size: 0.68rem; letter-spacing: 1.5px; }
    .schedule-table th.th-num { width: 70px; }
    .schedule-table th.th-vs  { width: 50px; }
    .schedule-table td { padding: 11px 16px; }
    .td-num { font-size: 0.82rem; }
    .td-vs  { font-size: 1rem; width: 50px; padding-left: 4px; padding-right: 4px; }
    .names-a { gap: 6px; }
    .names-b { gap: 6px; }
    .names-rest { gap: 6px; }
    .chip-a { padding: 4px 14px; font-size: 0.88rem; border-radius: 14px; }
    .chip-b { padding: 4px 14px; font-size: 0.88rem; border-radius: 14px; }

    /* Stats table */
    .player-table th { padding: 11px 16px; font-size: 0.7rem; letter-spacing: 1.5px; }
    .player-table td { padding: 11px 16px; font-size: 0.9rem; }

    /* Show progress bar on desktop */
    .bar-wrap { display: block; width: 90px; margin-left: 8px; }
    .td-appearances { display: flex; align-items: center; }
  }
</style>
</head>
<body>

<header>
  <h1>羽球分組</h1>
  <p class="subtitle">Badminton Group Scheduler</p>
</header>

<div class="container">
  <div class="setup-panel">
    <div class="panel-title">設定人數與名單</div>
    <div class="count-select-row">
      <div class="select-row-item">
        <label>參賽人數：</label>
        <select id="playerCount">
          <option value="6" selected>6 人</option>
          <option value="7">7 人</option>
          <option value="8">8 人</option>
          <option value="9">9 人</option>
          <option value="10">10 人</option>
          <option value="11">11 人</option>
          <option value="12">12 人</option>
        </select>
      </div>
      <div class="select-row-item">
        <label>場次數量：</label>
        <select id="roundCount"></select>
      </div>
    </div>
    <div class="players-grid" id="playersGrid"></div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="btn-row" style="margin-top:6px">
      <button class="btn btn-primary" onclick="generateSchedule()">🏸 產生分組</button>
      <button class="btn btn-secondary" onclick="clearNames()">清除名單</button>
    </div>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="stats-row" id="statsRow"></div>
    <div class="setup-panel">
      <div class="panel-title">場次總覽</div>
      <div class="schedule-table-wrap">
        <table class="schedule-table" id="scheduleTable"></table>
      </div>
    </div>
    <div class="player-stats-section">
      <div class="setup-panel" style="margin-top:0">
        <div class="panel-title">出場統計</div>
        <table class="player-table">
          <thead>
            <tr>
              <th>選手</th>
              <th>出場</th>
              <th>休息</th>
              <th>搭檔</th>
              <th>對戰</th>
            </tr>
          </thead>
          <tbody id="playerTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ── 計算合法場次 ──────────────────────────────────────────────────────────
function calcValidRounds(n) {
  const result = [];
  for (let k = 1; k <= 30; k++) {
    const r = n * k / 4;
    if (Number.isInteger(r) && r >= 6 && r <= 30) result.push(r);
  }
  return result;
}

const countSelect = document.getElementById('playerCount');
const roundSelect = document.getElementById('roundCount');
const playersGrid = document.getElementById('playersGrid');
const savedNames  = new Array(12).fill('');

// 偵測是否為桌面裝置
const isDesktop = () => window.innerWidth >= 768;

function saveCurrentNames() {
  for (let i = 0; i < 12; i++) {
    const el = document.getElementById('p' + (i + 1));
    if (el) savedNames[i] = el.value;
  }
}

function buildAll() {
  saveCurrentNames();
  const n = parseInt(countSelect.value);

  playersGrid.innerHTML = '';
  for (let i = 1; i <= n; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'player-input-wrap';
    wrap.innerHTML = `<span class="player-num">${i}</span><input type="text" id="p${i}" placeholder="選手 ${i}" maxlength="10">`;
    playersGrid.appendChild(wrap);
    if (savedNames[i - 1]) document.getElementById('p' + i).value = savedNames[i - 1];
  }

  roundSelect.innerHTML = '';
  calcValidRounds(n).forEach((r, i) => {
    const o = document.createElement('option');
    o.value = r; o.textContent = `${r} 場`;
    if (i === 1) o.selected = true;
    roundSelect.appendChild(o);
  });
}

countSelect.addEventListener('change', buildAll);
buildAll();

function clearNames() {
  const n = parseInt(countSelect.value);
  for (let i = 1; i <= n; i++) {
    const el = document.getElementById('p' + i);
    if (el) el.value = '';
  }
}

function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('show'); }
function hideError()    { document.getElementById('errorMsg').classList.remove('show'); }

function getNames() {
  const n = parseInt(countSelect.value);
  return Array.from({length: n}, (_, i) => {
    const v = document.getElementById('p' + (i+1)).value.trim();
    return v || ('選手' + (i+1));
  });
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── 排程核心 ──────────────────────────────────────────────────────────────
function trySchedule(n, totalRounds) {
  const appearances   = new Array(n).fill(0);
  const consecutiveOn = new Array(n).fill(0);
  const partnerCount  = Array.from({length: n}, () => new Array(n).fill(0));
  const rounds = [];
  const targetApp = totalRounds * 4 / n;
  if (!Number.isInteger(targetApp)) return null;

  for (let r = 0; r < totalRounds; r++) {
    const mustRest = new Set();
    for (let i = 0; i < n; i++) { if (consecutiveOn[i] >= 2) mustRest.add(i); }

    const eligible = [];
    for (let i = 0; i < n; i++) {
      if (!mustRest.has(i) && appearances[i] < targetApp) eligible.push(i);
    }
    if (eligible.length < 4) return null;

    eligible.sort((a, b) => appearances[a] - appearances[b] + (Math.random() - 0.5) * 0.3);
    const selected = eligible.slice(0, 4);

    const splits = [
      [[selected[0], selected[1]], [selected[2], selected[3]]],
      [[selected[0], selected[2]], [selected[1], selected[3]]],
      [[selected[0], selected[3]], [selected[1], selected[2]]],
    ];
    let bestSplit = splits[0], bestPS = Infinity;
    for (const [tA, tB] of splits) {
      const ps = partnerCount[tA[0]][tA[1]] + partnerCount[tB[0]][tB[1]];
      if (ps < bestPS) { bestPS = ps; bestSplit = [tA, tB]; }
    }

    const [tA, tB] = bestSplit;
    const resting = [];
    for (let i = 0; i < n; i++) { if (!selected.includes(i)) resting.push(i); }
    rounds.push({ tA, tB, resting });

    for (let i = 0; i < n; i++) {
      if (selected.includes(i)) { appearances[i]++; consecutiveOn[i]++; }
      else { consecutiveOn[i] = 0; }
    }
    partnerCount[tA[0]][tA[1]]++; partnerCount[tA[1]][tA[0]]++;
    partnerCount[tB[0]][tB[1]]++; partnerCount[tB[1]][tB[0]]++;
  }

  const finalApp = new Array(n).fill(0);
  for (const {tA, tB} of rounds) { [...tA, ...tB].forEach(p => finalApp[p]++); }
  if (Math.max(...finalApp) !== Math.min(...finalApp)) return null;
  return rounds;
}

function scoreSchedule(rounds, n) {
  const partnerCount = Array.from({length: n}, () => new Array(n).fill(0));
  for (const {tA, tB} of rounds) {
    partnerCount[tA[0]][tA[1]]++; partnerCount[tA[1]][tA[0]]++;
    partnerCount[tB[0]][tB[1]]++; partnerCount[tB[1]][tB[0]]++;
  }
  let penalty = 0;
  for (let i = 0; i < n; i++)
    for (let j = i+1; j < n; j++)
      if (partnerCount[i][j] > 1) penalty += (partnerCount[i][j] - 1);
  return -penalty;
}

function generateSchedule() {
  hideError();
  const names = getNames();
  const n = names.length;
  const totalRounds = parseInt(roundSelect.value);
  let best = null, bestScore = -Infinity;

  for (let attempt = 0; attempt < 600; attempt++) {
    const result = trySchedule(n, totalRounds);
    if (!result) continue;
    const score = scoreSchedule(result, n);
    if (score > bestScore) { bestScore = score; best = result; }
    if (bestScore === 0) break;
  }

  if (!best) { showError('無法產生符合所有條件的分組，請換一個場次數量再試。'); return; }
  renderResults(names, best);
}

// ── 渲染結果 ──────────────────────────────────────────────────────────────
function renderResults(names, rounds) {
  const n = names.length;
  const desktop = isDesktop();
  const section = document.getElementById('resultsSection');
  section.classList.add('visible');

  const appearances   = new Array(n).fill(0);
  const partnerCount  = Array.from({length: n}, () => new Array(n).fill(0));
  const opponentCount = Array.from({length: n}, () => new Array(n).fill(0));

  for (const {tA, tB} of rounds) {
    tA.forEach(p => appearances[p]++);
    tB.forEach(p => appearances[p]++);
    partnerCount[tA[0]][tA[1]]++; partnerCount[tA[1]][tA[0]]++;
    partnerCount[tB[0]][tB[1]]++; partnerCount[tB[1]][tB[0]]++;
    tA.forEach(a => tB.forEach(b => { opponentCount[a][b]++; opponentCount[b][a]++; }));
  }

  const minApp = Math.min(...appearances), maxApp = Math.max(...appearances);

  // 統計卡片
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${rounds.length}</div><div class="stat-label">總場次</div></div>
    <div class="stat-card"><div class="stat-num">${n}</div><div class="stat-label">參賽人數</div></div>
    <div class="stat-card"><div class="stat-num">${minApp === maxApp ? minApp : minApp+'~'+maxApp}</div><div class="stat-label">每人出場</div></div>
    <div class="stat-card"><div class="stat-num">${n-4}</div><div class="stat-label">每場休息</div></div>
  `;

  // 場次表
  const table   = document.getElementById('scheduleTable');
  const hasRest = rounds.some(r => r.resting.length > 0);

  // 桌面版：場次編號較寬，名字標籤大
  const numLabel = desktop ? '場次' : '場次';
  table.innerHTML = `
    <thead><tr>
      <th class="th-num">${numLabel}</th>
      <th class="th-a">A 隊</th>
      <th class="th-vs"></th>
      <th class="th-b">B 隊</th>
      ${hasRest ? '<th class="th-rest">休息</th>' : ''}
    </tr></thead>
    <tbody>${rounds.map(({tA, tB, resting}, i) => `
      <tr>
        <td class="td-num">${desktop ? '場次 ' : ''}${String(i+1).padStart(2,'0')}</td>
        <td class="td-a"><div class="names-a">${tA.map(p=>`<span class="chip-a">${names[p]}</span>`).join('')}</div></td>
        <td class="td-vs">VS</td>
        <td class="td-b"><div class="names-b">${tB.map(p=>`<span class="chip-b">${names[p]}</span>`).join('')}</div></td>
        ${hasRest ? `<td class="td-rest"><div class="names-rest">${resting.map(p=>`<span class="chip-rest">${names[p]}</span>`).join('')}</div></td>` : ''}
      </tr>`).join('')}
    </tbody>`;

  // 統計表（桌面版加進度條）
  const maxApp2 = Math.max(...appearances);
  document.getElementById('playerTableBody').innerHTML = names.map((name, i) => {
    const uPartners  = names.filter((_,j) => j!==i && partnerCount[i][j]>0).length;
    const uOpponents = names.filter((_,j) => j!==i && opponentCount[i][j]>0).length;
    const restCount  = rounds.length - appearances[i];
    const pct = maxApp2 > 0 ? (appearances[i]/maxApp2*100) : 0;
    const appCell = desktop
      ? `<td><div class="td-appearances">${appearances[i]}<div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div></div></td>`
      : `<td>${appearances[i]}</td>`;
    return `<tr><td><strong>${name}</strong></td>${appCell}<td>${restCount}</td><td>${uPartners}</td><td>${uOpponents}</td></tr>`;
  }).join('');

  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
